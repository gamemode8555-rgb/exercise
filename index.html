<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🐾 Dog Trick Challenge</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap');

    :root {
      --bg:     #0b0b18;
      --card:   #13132a;
      --card2:  #1b1b38;
      --accent: #f9c846;
      --red:    #ff6b6b;
      --green:  #4ade80;
      --blue:   #60a5fa;
      --purple: #a78bfa;
      --border: rgba(255,255,255,0.07);
      --text:   #f0f0ff;
      --muted:  #7777a0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 22px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0; z-index: 10;
    }
    .logo {
      font-family: 'Fredoka One', cursive; font-size: 1.5rem; letter-spacing: 1px;
      background: linear-gradient(135deg, var(--accent), var(--red));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .pill {
      display: flex; align-items: center; gap: 6px;
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 99px; padding: 4px 13px;
      font-size: .75rem; color: var(--muted);
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
    .dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 1.6s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── MAIN LAYOUT ── */
    .layout {
      flex: 1; display: grid;
      grid-template-columns: 1fr 1fr 260px;
      gap: 14px; padding: 14px;
      overflow: hidden;
      min-height: 0;
    }

    /* ── VIDEO PANELS ── */
    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      display: flex; flex-direction: column;
      min-height: 0;
    }
    .panel-title {
      font-size: .68rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: 2px;
      padding: 9px 14px 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* YouTube */
    .yt-wrap { flex: 1; position: relative; background: #000; }
    .yt-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

    /* Camera */
    .cam-wrap { flex: 1; position: relative; background: #000; }

    /* The hidden <video> is our camera source */
    #rawVideo {
      position: absolute;
      width: 1px; height: 1px; opacity: 0;
      pointer-events: none; top: 0; left: 0;
    }

    /* Canvas fills the panel */
    #poseCanvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }

    /* detected label overlay */
    .det-badge {
      position: absolute; bottom: 12px; left: 12px;
      background: rgba(0,0,0,0.58); backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 10px; padding: 7px 13px;
      pointer-events: none;
    }
    .det-badge .dl { font-size: .62rem; color: rgba(255,255,255,0.38); text-transform: uppercase; letter-spacing: 1px; }
    .det-badge .dn { font-family: 'Fredoka One', cursive; font-size: 1.3rem; color: var(--accent); }
    .det-badge .dc { font-size: .68rem; color: rgba(255,255,255,0.38); }

    /* Loading screen */
    .cam-load {
      position: absolute; inset: 0;
      background: var(--card);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      z-index: 5;
      transition: opacity .5s;
    }
    .cam-load.gone { opacity: 0; pointer-events: none; }
    .spin { width: 38px; height: 38px; border: 3px solid rgba(255,255,255,0.08); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .cam-load p { font-size: .82rem; color: var(--muted); text-align: center; padding: 0 20px; line-height: 1.5; }

    /* ── SIDE PANEL ── */
    .side {
      display: flex; flex-direction: column; gap: 11px;
      overflow-y: auto; scrollbar-width: none; min-height: 0;
    }
    .side::-webkit-scrollbar { display: none; }
    .sc {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 13px 15px; flex-shrink: 0;
    }
    .sc-lbl { font-size: .65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 9px; }

    /* Score */
    .score-big {
      font-family: 'Fredoka One', cursive; font-size: 4rem; line-height: 1;
      background: linear-gradient(135deg, var(--accent), var(--red));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-align: center;
    }
    .score-big.pop { animation: sp .28s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes sp { 0%{transform:scale(1.5)} 100%{transform:scale(1)} }
    .combo { display: inline-block; width: 100%; text-align: center; margin-top: 5px; background: var(--purple); color: white; border-radius: 99px; padding: 2px 10px; font-size: .72rem; font-weight: 800; opacity: 0; transition: opacity .3s; }
    .combo.show { opacity: 1; }

    /* Trick */
    .trick-c { text-align: center; }
    .trick-em { font-size: 2.2rem; }
    .trick-nm { font-family: 'Fredoka One', cursive; font-size: 1.75rem; letter-spacing: 1px; margin-top: 2px; }
    .hold-wrap { background: rgba(255,255,255,0.05); border-radius: 99px; height: 7px; margin-top: 9px; overflow: hidden; }
    .hold-fill { height: 100%; border-radius: 99px; width: 0%; background: linear-gradient(90deg, var(--green), var(--blue)); transition: width .1s linear; }
    .hold-hint { font-size: .68rem; color: var(--muted); margin-top: 4px; text-align: center; }

    /* Bars */
    .bar-row { margin-bottom: 6px; }
    .bar-top { display: flex; justify-content: space-between; font-size: .68rem; color: var(--muted); margin-bottom: 2px; }
    .bar-track { background: rgba(255,255,255,0.05); border-radius: 99px; height: 6px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--blue), var(--purple)); transition: width .12s; }
    .bar-fill.hot { background: linear-gradient(90deg, var(--accent), var(--red)); }

    /* Sequence */
    .seq-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
    .seq-item { display: flex; align-items: center; gap: 8px; padding: 6px 9px; border-radius: 8px; font-size: .78rem; font-weight: 700; background: rgba(255,255,255,0.02); border: 1px solid transparent; transition: all .22s; }
    .seq-item .sn { width: 19px; height: 19px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.06); font-size: .6rem; font-weight: 800; flex-shrink: 0; }
    .seq-item .pts { margin-left: auto; font-size: .64rem; color: var(--muted); }
    .seq-item.done  { color: var(--green);  border-color: rgba(74,222,128,0.2);  background: rgba(74,222,128,0.06); }
    .seq-item.done  .sn { background: rgba(74,222,128,0.22); }
    .seq-item.active{ color: var(--accent); border-color: rgba(249,200,70,0.25); background: rgba(249,200,70,0.07); box-shadow: 0 0 9px rgba(249,200,70,0.09); }
    .seq-item.active .sn { background: rgba(249,200,70,0.22); }

    /* Buttons */
    .btn-row { display: flex; gap: 8px; }
    .btn { flex: 1; padding: 10px 6px; border-radius: 9px; border: none; cursor: pointer; font-family: 'Fredoka One', cursive; font-size: .88rem; transition: transform .12s, opacity .15s; }
    .btn:hover:not(:disabled) { transform: translateY(-1px); }
    .btn:active:not(:disabled) { transform: scale(.96); }
    .btn:disabled { opacity: .35; cursor: default; transform: none; }
    .btn-start { background: linear-gradient(135deg, var(--accent), var(--red)); color: #0b0b18; }
    .btn-reset  { background: var(--card2); color: var(--muted); border: 1px solid var(--border); }

    /* Toast */
    .toast { position: fixed; top: 18px; left: 50%; transform: translateX(-50%) translateY(-80px); background: var(--green); color: #0b0b18; font-family: 'Fredoka One', cursive; font-size: 1.45rem; letter-spacing: 2px; padding: 10px 34px; border-radius: 99px; pointer-events: none; z-index: 999; opacity: 0; transition: transform .32s cubic-bezier(0.34,1.56,0.64,1), opacity .32s; }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.wrong { background: var(--red); color: white; }

    /* Result */
    .result { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(11,11,24,0.93); backdrop-filter: blur(14px); flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
    .result.show { display: flex; }
    .result h2 { font-family: 'Fredoka One', cursive; font-size: 2.3rem; background: linear-gradient(135deg, var(--accent), var(--red)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .result .fin { font-family: 'Fredoka One', cursive; font-size: 5.5rem; color: var(--accent); line-height: 1; }
    .result p { color: var(--muted); }
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="result" id="resultOverlay">
  <div style="font-size:4.5rem">🏆</div>
  <h2>완주했어요!</h2>
  <div class="fin" id="finalScore">0</div>
  <p>최종 점수</p>
  <button class="btn btn-start" style="padding:13px 44px;font-size:1rem;margin-top:6px;pointer-events:auto" onclick="resetGame()">↺ 다시 하기</button>
</div>

<header>
  <div class="logo">🐾 Dog Trick Challenge</div>
  <div class="pill">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">초기화 중…</span>
  </div>
</header>

<div class="layout">

  <!-- YouTube -->
  <div class="panel">
    <div class="panel-title">📺 참고 영상</div>
    <div class="yt-wrap">
      <iframe src="https://www.youtube.com/embed/oRr5hxr_bRA?rel=0&modestbranding=1"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen></iframe>
    </div>
  </div>

  <!-- Camera -->
  <div class="panel">
    <div class="panel-title">📷 내 카메라</div>
    <div class="cam-wrap">

      <!-- Hidden video source -->
      <video id="rawVideo" playsinline autoplay muted></video>

      <!-- Canvas we render pose onto -->
      <canvas id="poseCanvas"></canvas>

      <!-- Detected label -->
      <div class="det-badge">
        <div class="dl">감지된 동작</div>
        <div class="dn" id="detName">—</div>
        <div class="dc" id="detConf">신뢰도 —</div>
      </div>

      <!-- Loading overlay -->
      <div class="cam-load" id="camLoad">
        <div class="spin"></div>
        <p id="loadMsg">모델 로딩 중…</p>
      </div>
    </div>
  </div>

  <!-- Side -->
  <div class="side">

    <div class="sc">
      <div class="sc-lbl">Score</div>
      <div class="score-big" id="scoreNum">0</div>
      <div class="combo" id="comboBadge">🔥 COMBO x2</div>
    </div>

    <div class="sc">
      <div class="sc-lbl">현재 동작</div>
      <div class="trick-c">
        <div class="trick-em" id="trickEmoji">❓</div>
        <div class="trick-nm" id="trickName">—</div>
      </div>
      <div class="hold-wrap"><div class="hold-fill" id="holdFill"></div></div>
      <div class="hold-hint" id="holdHint">동작을 1.5초 유지하세요</div>
    </div>

    <div class="sc">
      <div class="sc-lbl">포즈 신뢰도</div>
      <div id="confBars"></div>
    </div>

    <div class="sc" style="flex:1;min-height:0">
      <div class="sc-lbl">동작 순서</div>
      <ul class="seq-list" id="seqList"></ul>
    </div>

    <div class="btn-row">
      <button class="btn btn-start" id="btnStart" onclick="startGame()" disabled>▶ 시작</button>
      <button class="btn btn-reset" onclick="resetGame()">↺ 초기화</button>
    </div>

  </div>
</div>

<script>
const MODEL_URL   = 'https://teachablemachine.withgoogle.com/models/zXloZdmha/';
const HOLD_MS     = 1500;
const CONF_THRESH = 0.75;

const SEQUENCE = [
  { trick: 'REST',   emoji: '😴', pts: 10 },
  { trick: 'SAY HI', emoji: '👋', pts: 20 },
  { trick: 'WALK',   emoji: '🚶', pts: 15 },
  { trick: 'SWING',  emoji: '🎶', pts: 25 },
  { trick: 'PAW',    emoji: '🐾', pts: 20 },
  { trick: 'JUMP',   emoji: '🦘', pts: 30 },
];

let model, ctx, videoEl;
let score = 0, combo = 1, seqIdx = 0;
let holdStart = null, gameRunning = false;
let detected = null;

const $ = id => document.getElementById(id);

// ── INIT BARS ────────────────────────────────────────────────────────────────
function initBars() {
  $('confBars').innerHTML = SEQUENCE.map(s => `
    <div class="bar-row">
      <div class="bar-top">
        <span>${s.emoji} ${s.trick}</span>
        <span id="pct-${s.trick.replace(' ','-')}">0%</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" id="fill-${s.trick.replace(' ','-')}" style="width:0%"></div>
      </div>
    </div>`).join('');
}
initBars();

function updateBars(preds) {
  preds.forEach(p => {
    const k = p.className.replace(' ','-');
    const pct = Math.round(p.probability * 100);
    const f = $('fill-'+k), pp = $('pct-'+k);
    if (f)  { f.style.width = pct+'%'; f.classList.toggle('hot', pct >= CONF_THRESH*100); }
    if (pp) pp.textContent = pct+'%';
  });
}

// ── SEQ LIST ─────────────────────────────────────────────────────────────────
function buildSeqList() {
  $('seqList').innerHTML = SEQUENCE.map((s,i) => `
    <li class="seq-item${i===0?' active':''}" id="seq-${i}">
      <div class="sn">${i+1}</div>
      <span>${s.emoji} ${s.trick}</span>
      <span class="pts">+${s.pts}</span>
    </li>`).join('');
}
buildSeqList();

function updateSeqList() {
  SEQUENCE.forEach((_,i) => {
    const el = $('seq-'+i);
    if (el) el.className = 'seq-item'+(i<seqIdx?' done':i===seqIdx?' active':'');
  });
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    $('loadMsg').textContent = '모델 로딩 중…';
    model = await tmPose.load(MODEL_URL+'model.json', MODEL_URL+'metadata.json');

    $('loadMsg').textContent = '카메라 권한 요청 중…';
    videoEl = $('rawVideo');

    // Use getUserMedia directly — avoids tmPose.Webcam issues
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' },
      audio: false
    });
    videoEl.srcObject = stream;

    await new Promise((resolve, reject) => {
      videoEl.onloadedmetadata = () => videoEl.play().then(resolve).catch(reject);
      videoEl.onerror = reject;
    });

    // Wait a tick for actual dimensions
    await new Promise(r => setTimeout(r, 200));

    const canvas = $('poseCanvas');
    canvas.width  = videoEl.videoWidth  || 640;
    canvas.height = videoEl.videoHeight || 480;
    ctx = canvas.getContext('2d');

    $('camLoad').classList.add('gone');
    $('statusDot').classList.add('on');
    $('statusText').textContent = '준비 완료';
    $('btnStart').disabled = false;

    poseLoop();
  } catch(err) {
    const msg = err.name === 'NotAllowedError'
      ? '카메라 권한이 거부되었습니다.\n브라우저 주소창 옆 🔒 아이콘을 눌러 카메라를 허용해 주세요.'
      : '오류: ' + err.message;
    $('loadMsg').textContent = msg;
    $('statusText').textContent = '오류';
    console.error(err);
  }
}

// ── POSE LOOP ─────────────────────────────────────────────────────────────────
async function poseLoop() {
  if (!model || !videoEl || videoEl.readyState < 2) {
    requestAnimationFrame(poseLoop); return;
  }

  const canvas = $('poseCanvas');
  const { pose, posenetOutput } = await model.estimatePose(videoEl);
  const preds = await model.predict(posenetOutput);

  // Draw mirrored frame
  ctx.save();
  ctx.translate(canvas.width, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
  ctx.restore();

  if (pose && pose.keypoints) drawSkeleton(pose, canvas.width);

  // Top class
  const top = preds.reduce((a,b) => a.probability > b.probability ? a : b);
  detected = top.probability >= CONF_THRESH ? top.className : null;

  $('detName').textContent = detected || '—';
  $('detConf').textContent = '신뢰도 ' + Math.round(top.probability*100) + '%';
  updateBars(preds);

  if (gameRunning) checkTrick();

  requestAnimationFrame(poseLoop);
}

const PAIRS = [[5,7],[7,9],[6,8],[8,10],[5,6],[5,11],[6,12],[11,12],[11,13],[13,15],[12,14],[14,16]];
function drawSkeleton(pose, W) {
  const kps = pose.keypoints;
  ctx.lineWidth = 2.5;
  ctx.strokeStyle = 'rgba(249,200,70,0.75)';
  PAIRS.forEach(([a,b]) => {
    const ka=kps[a], kb=kps[b];
    if (ka.score>0.3 && kb.score>0.3) {
      ctx.beginPath();
      ctx.moveTo(W-ka.position.x, ka.position.y);
      ctx.lineTo(W-kb.position.x, kb.position.y);
      ctx.stroke();
    }
  });
  kps.forEach(kp => {
    if (kp.score>0.3) {
      ctx.beginPath();
      ctx.arc(W-kp.position.x, kp.position.y, 5, 0, 2*Math.PI);
      ctx.fillStyle = 'rgba(249,200,70,0.9)';
      ctx.fill();
    }
  });
}

// ── GAME ──────────────────────────────────────────────────────────────────────
function startGame() {
  if (gameRunning) return;
  gameRunning = true;
  seqIdx = 0; score = 0; combo = 1;
  $('scoreNum').textContent = '0';
  $('holdFill').style.width = '0%';
  $('comboBadge').classList.remove('show');
  updateSeqList();
  showTrick();
  $('btnStart').disabled = true;
}

function showTrick() {
  if (seqIdx >= SEQUENCE.length) { endGame(); return; }
  const s = SEQUENCE[seqIdx];
  $('trickEmoji').textContent = s.emoji;
  $('trickName').textContent  = s.trick;
  $('holdFill').style.width   = '0%';
  $('holdHint').textContent   = '동작을 1.5초 유지하세요';
  holdStart = null;
}

function checkTrick() {
  if (seqIdx >= SEQUENCE.length) return;
  const s = SEQUENCE[seqIdx];
  if (detected === s.trick) {
    if (!holdStart) holdStart = Date.now();
    const el = Date.now() - holdStart;
    $('holdFill').style.width = Math.min(100,(el/HOLD_MS)*100)+'%';
    $('holdHint').textContent = `유지 중… ${(Math.max(0,HOLD_MS-el)/1000).toFixed(1)}초`;
    if (el >= HOLD_MS) {
      award(s); seqIdx++;
      updateSeqList(); showTrick();
    }
  } else {
    holdStart = null;
    $('holdFill').style.width = '0%';
    $('holdHint').textContent = '동작을 1.5초 유지하세요';
  }
}

function award(s) {
  const pts = s.pts * combo;
  score += pts;
  const el = $('scoreNum');
  el.textContent = score;
  el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
  combo = Math.min(combo+1, 4);
  if (combo >= 2) { $('comboBadge').textContent = `🔥 COMBO x${combo}`; $('comboBadge').classList.add('show'); }
  showToast('GREAT!  +'+pts, false);
}

function showToast(msg, wrong) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.toggle('wrong', wrong);
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1300);
}

function endGame() {
  gameRunning = false;
  $('finalScore').textContent = score;
  $('resultOverlay').classList.add('show');
}

function resetGame() {
  gameRunning = false;
  seqIdx = 0; score = 0; combo = 1;
  $('scoreNum').textContent = '0';
  $('holdFill').style.width = '0%';
  $('holdHint').textContent = '동작을 1.5초 유지하세요';
  $('trickEmoji').textContent = '❓';
  $('trickName').textContent = '—';
  $('comboBadge').classList.remove('show');
  buildSeqList();
  $('resultOverlay').classList.remove('show');
  $('btnStart').disabled = false;
}

init();
</script>
</body>
</html>
